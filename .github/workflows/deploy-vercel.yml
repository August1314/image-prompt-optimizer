name: Deploy to Vercel

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: team_ioaIoGGcFdJvqaZI3nvRnsVO
      VERCEL_PROJECT_ID: prj_QfqPw9Zj6cS6ibzYdbSRk2MNhHXZ

    steps:
      - name: Check out validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Missing repository secret: VERCEL_TOKEN" >&2
            exit 1
          fi

      - name: Pull Vercel production settings
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel artifacts
        run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel production
        run: npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
